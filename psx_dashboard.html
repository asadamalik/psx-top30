<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Volume Signal — PSX</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

:root{
  --bg:#0E1419; --panel:#161D24; --panel2:#11171D; --line:#232D36;
  --text:#C9D4DB; --dim:#6B7A85; --dim2:#46535C;
  --signal:#E8B04B; --signal-dim:#5a4a26;
  --up:#3FB97A; --down:#E2615A;
  --mono:'IBM Plex Mono',ui-monospace,monospace;
  --disp:'Space Grotesk',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--disp);font-size:14px;-webkit-font-smoothing:antialiased}
.wrap{max-width:1280px;margin:0 auto;padding:18px 18px 60px}

/* header */
header{display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:space-between;gap:16px;
  border-bottom:1px solid var(--line);padding-bottom:14px;margin-bottom:18px}
.brand{display:flex;align-items:baseline;gap:12px}
.brand h1{font-size:22px;font-weight:700;letter-spacing:-.02em}
.brand .mk{color:var(--signal)}
.brand .dt{font-family:var(--mono);font-size:12px;color:var(--dim);letter-spacing:.04em}
.scorecard{display:flex;gap:0;border:1px solid var(--line);border-radius:8px;overflow:hidden}
.sc{padding:9px 16px;border-right:1px solid var(--line);min-width:96px}
.sc:last-child{border-right:0}
.sc .lab{font-size:9.5px;text-transform:uppercase;letter-spacing:.13em;color:var(--dim);margin-bottom:3px}
.sc .val{font-family:var(--mono);font-size:18px;font-weight:600}
.sc .val.up{color:var(--up)} .sc .val.down{color:var(--down)} .sc .val.sig{color:var(--signal)}

/* chips */
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;align-items:center}
.chips .tag{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--dim);margin-right:4px}
.chip{font-family:var(--mono);font-size:11.5px;padding:3px 8px;border-radius:5px;border:1px solid var(--line);cursor:pointer;transition:.12s}
.chip.new{color:var(--signal);border-color:var(--signal-dim);background:rgba(232,176,75,.07)}
.chip.drop{color:var(--down);border-color:#43282a;background:rgba(226,97,90,.06);text-decoration:line-through;cursor:default;opacity:.85}
.chip.new:hover{background:rgba(232,176,75,.16)}

/* grid */
.grid{display:grid;grid-template-columns:minmax(0,360px) minmax(0,1fr);gap:18px;align-items:stretch}
.grid>div:not(.panel){display:flex;min-height:0}
.grid>div:not(.panel)>.panel{flex:1;display:flex;flex-direction:column;min-height:0}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden}
.phead{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-bottom:1px solid var(--line)}
.phead h2{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.1em}
.phead .meta{font-family:var(--mono);font-size:11px;color:var(--dim)}

/* leaderboard */
.lb{max-height:560px;overflow-y:auto}
.row{display:grid;grid-template-columns:18px 1fr auto auto;gap:10px;align-items:center;
  padding:8px 14px;border-bottom:1px solid var(--panel2);cursor:pointer;position:relative;transition:background .1s}
.row:hover{background:var(--panel2)}
.row.active{background:#1b2730}
.row.isnew::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--signal)}
.rank{font-family:var(--mono);font-size:11px;color:var(--dim2);text-align:right}
.sym{font-family:var(--mono);font-weight:600;font-size:13px;display:flex;align-items:center;gap:7px}
.sym .ndot{font-size:8px;color:var(--signal);letter-spacing:.1em;border:1px solid var(--signal-dim);border-radius:3px;padding:1px 4px;font-weight:500}
.vol{font-family:var(--mono);font-size:11.5px;color:var(--dim);text-align:right}
.chg{font-family:var(--mono);font-size:12px;text-align:right;min-width:54px}
.chg.up{color:var(--up)} .chg.down{color:var(--down)}

/* chart */
.chartbox{padding:0;flex:1;min-height:360px;position:relative;background:var(--panel2)}
#cv{position:absolute;inset:0;width:100%;height:100%;display:block}
#cvfallback{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;text-align:center;padding:24px;color:var(--dim)}
#cvfallback a{color:var(--signal);text-decoration:none;font-family:var(--mono);font-size:13px;border:1px solid var(--signal-dim);padding:8px 14px;border-radius:6px}
.cvtip{position:absolute;pointer-events:none;background:#0b1015ee;border:1px solid var(--line);border-radius:7px;
  padding:7px 9px;font-family:var(--mono);font-size:10.5px;line-height:1.5;color:var(--text);z-index:3;white-space:nowrap}
.cvtip b{color:var(--dim);font-weight:400}

/* ===== stock detail overlay ===== */
#detail{position:fixed;inset:0;background:rgba(8,12,16,.93);z-index:50;overflow-y:auto;backdrop-filter:blur(3px)}
.dt-wrap{max-width:1100px;margin:0 auto;padding:22px 18px 70px}
.dt-top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:18px}
.dt-id h1{font-size:26px;font-weight:700;letter-spacing:-.02em;display:flex;align-items:center;gap:10px}
.dt-id .tk{font-family:var(--mono);font-size:13px;color:var(--bg);background:var(--signal);padding:2px 8px;border-radius:6px;font-weight:600}
.dt-id .nm{font-size:13px;color:var(--dim);margin-top:4px}
.dt-id .pr{font-family:var(--mono);font-size:20px;font-weight:600;margin-top:8px}
.dt-id .pr .ch{font-size:14px;margin-left:8px}
.dt-close{font-family:var(--mono);font-size:13px;color:var(--text);background:var(--panel2);border:1px solid var(--line);
  border-radius:8px;padding:8px 14px;cursor:pointer;white-space:nowrap}
.dt-close:hover{border-color:var(--signal-dim)}
.dt-scores{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:8px}
.score{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px}
.score .lab{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--dim);margin-bottom:8px}
.score .num{font-family:var(--mono);font-size:30px;font-weight:600;line-height:1}
.score .sub{font-size:11px;color:var(--dim);margin-top:6px}
.score .meter{height:4px;border-radius:2px;background:var(--panel2);margin-top:9px;overflow:hidden}
.score .meter i{display:block;height:100%}
.dt-disc{font-size:11px;color:var(--dim2);margin:6px 2px 18px}
.dt-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:0;overflow:hidden}
.card h3{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;padding:12px 16px;border-bottom:1px solid var(--line);color:var(--text)}
.card .body{padding:12px 16px}
.kv{display:flex;justify-content:space-between;gap:10px;padding:6px 0;border-bottom:1px solid var(--panel2);font-size:13px}
.kv:last-child{border-bottom:0}
.kv .k{color:var(--dim)}
.kv .v{font-family:var(--mono);font-weight:500;text-align:right}
.kv .v.up{color:var(--up)} .kv .v.down{color:var(--down)} .kv .v.sig{color:var(--signal)}
.pill{font-family:var(--mono);font-size:10px;padding:1px 7px;border-radius:5px;border:1px solid var(--line)}
.pill.up{color:var(--up);border-color:#274b39} .pill.down{color:var(--down);border-color:#43282a}
.pill.neu{color:var(--dim)}
.epsbars{display:flex;align-items:flex-end;gap:8px;height:70px;margin-top:6px}
.epsbars .b{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%;justify-content:flex-end}
.epsbars .b .bar{width:100%;border-radius:3px 3px 0 0;min-height:2px}
.epsbars .b .yl{font-family:var(--mono);font-size:9px;color:var(--dim2)}
.epsbars .b .vl{font-family:var(--mono);font-size:10px;color:var(--text)}
.filing{font-size:12px;padding:7px 0;border-bottom:1px solid var(--panel2);display:flex;gap:10px}
.filing:last-child{border-bottom:0}
.filing .fd{font-family:var(--mono);font-size:10.5px;color:var(--signal);white-space:nowrap;min-width:74px}
.filing .ft{color:var(--text);line-height:1.35}
.dt-links{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px}
.dt-links a{font-family:var(--mono);font-size:12px;color:var(--signal);text-decoration:none;border:1px solid var(--signal-dim);border-radius:7px;padding:7px 12px}
.detailbtn{font-family:var(--mono);font-size:11px;color:var(--signal);background:rgba(232,176,75,.08);
  border:1px solid var(--signal-dim);border-radius:6px;padding:4px 10px;cursor:pointer;white-space:nowrap}
.detailbtn:hover{background:rgba(232,176,75,.18)}
.full{grid-column:1/-1}
@media(max-width:760px){.dt-scores{grid-template-columns:repeat(2,1fr)}.dt-grid{grid-template-columns:1fr}}
.chart-cap{display:flex;gap:14px;padding:9px 14px;border-top:1px solid var(--line);font-family:var(--mono);font-size:11px;color:var(--dim);flex-wrap:wrap}
.chart-cap b{color:var(--text);font-weight:600}
.chart-cap .openlink{margin-left:auto;color:var(--signal);text-decoration:none}

/* ledger */
.ledger-wrap{margin-top:18px}
.ledtabs{display:flex;gap:0}
.ledtab{font-size:11px;text-transform:uppercase;letter-spacing:.09em;color:var(--dim);padding:6px 13px;
  border:1px solid var(--line);border-bottom:0;border-radius:7px 7px 0 0;cursor:pointer;background:var(--panel2);margin-right:4px}
.ledtab.on{color:var(--text);background:var(--panel);border-color:var(--line)}
.ledger{border:1px solid var(--line);border-radius:0 10px 10px 10px;overflow:hidden;background:var(--panel)}
table{width:100%;border-collapse:collapse}
thead th{font-size:9.5px;text-transform:uppercase;letter-spacing:.1em;color:var(--dim);font-weight:500;
  text-align:right;padding:9px 12px;border-bottom:1px solid var(--line);white-space:nowrap}
thead th.l{text-align:left}
tbody td{font-family:var(--mono);font-size:12px;padding:7px 12px;text-align:right;border-bottom:1px solid var(--panel2)}
tbody td.l{text-align:left;font-weight:600}
tbody tr:hover{background:var(--panel2)}
.up{color:var(--up)} .down{color:var(--down)} .flat{color:var(--dim)}
.pk{color:var(--signal)}
.badge{font-size:9px;border-radius:3px;padding:1px 5px;letter-spacing:.06em}
.badge.in{color:var(--signal);border:1px solid var(--signal-dim)}
.badge.out{color:var(--dim2);border:1px solid var(--line)}
.note{font-size:11.5px;color:var(--dim);line-height:1.55;margin-top:14px;padding:12px 14px;
  border-left:2px solid var(--signal-dim);background:rgba(232,176,75,.04);border-radius:0 6px 6px 0}
.note b{color:var(--signal)}
/* movers */
.movers-wrap{margin-top:18px}
.seg{display:inline-flex;border:1px solid var(--line);border-radius:7px;overflow:hidden}
.seg button{font-family:var(--mono);font-size:11px;color:var(--dim);background:var(--panel2);
  border:0;border-right:1px solid var(--line);padding:5px 13px;cursor:pointer;transition:.12s}
.seg button:last-child{border-right:0}
.seg button.on{color:var(--bg);background:var(--signal);font-weight:600}
.movers-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:12px}
.mcol{background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden}
.mcol .phead h2 .ar{font-family:var(--mono);margin-right:6px}
.mcol.gain .phead h2 .ar{color:var(--up)} .mcol.lose .phead h2 .ar{color:var(--down)}
.mrow{display:grid;grid-template-columns:18px 1fr auto auto;gap:10px;align-items:center;
  padding:7px 14px;border-bottom:1px solid var(--panel2);cursor:pointer}
.mrow:hover{background:var(--panel2)}
.mrow .rk{font-family:var(--mono);font-size:11px;color:var(--dim2);text-align:right}
.mrow .ms{font-family:var(--mono);font-weight:600;font-size:13px}
.mrow .mp{font-family:var(--mono);font-size:10.5px;color:var(--dim2);text-align:right;white-space:nowrap}
.mrow .mr{font-family:var(--mono);font-size:13px;font-weight:600;text-align:right;min-width:62px}
.mrow .mr.up{color:var(--up)} .mrow .mr.down{color:var(--down)}
.mbar{height:3px;background:var(--panel2);border-radius:2px;overflow:hidden;margin-top:3px}
.mhint{font-size:11px;color:var(--dim);padding:8px 14px;border-top:1px solid var(--line)}

/* nav */
.nav{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
.nav button{font-family:var(--disp);font-size:13px;font-weight:600;color:var(--dim);background:var(--panel2);
  border:0;border-right:1px solid var(--line);padding:8px 18px;cursor:pointer;transition:.12s}
.nav button:last-child{border-right:0}
.nav button.on{color:var(--bg);background:var(--signal)}
.sc-row{margin-bottom:16px}

/* history */
.hist-head{display:flex;flex-wrap:wrap;gap:14px;align-items:flex-end;justify-content:space-between;margin-bottom:14px}
.hist-title h2{font-size:18px;font-weight:700;letter-spacing:-.01em}
.hist-sub{font-family:var(--mono);font-size:12px;color:var(--dim);display:block;margin-top:3px}
.hist-controls{display:flex;gap:12px;align-items:center}
.hist-controls input[type=search]{font-family:var(--mono);font-size:12px;background:var(--panel2);
  border:1px solid var(--line);border-radius:7px;color:var(--text);padding:7px 11px;width:190px;outline:none}
.hist-controls input[type=search]:focus{border-color:var(--signal-dim)}
.histtoggle{font-size:11px;color:var(--dim);display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none}
.histtoggle input{accent-color:var(--signal)}

.hist-feed{display:flex;flex-direction:column;gap:0}
.day{border:1px solid var(--line);border-radius:10px;margin-bottom:12px;overflow:hidden;background:var(--panel)}
.day-head{display:flex;align-items:center;gap:12px;padding:11px 16px;cursor:pointer;
  position:sticky;top:0;background:var(--panel);border-bottom:1px solid var(--line);z-index:1}
.day-head .dow{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--text)}
.day-head .cnt{font-family:var(--mono);font-size:11px;color:var(--signal);
  border:1px solid var(--signal-dim);border-radius:5px;padding:1px 7px}
.day-head .cntd{font-family:var(--mono);font-size:11px;color:var(--down);
  border:1px solid #43282a;border-radius:5px;padding:1px 7px}
.day-head .chev{margin-left:auto;color:var(--dim2);font-family:var(--mono);transition:transform .15s}
.day.collapsed .chev{transform:rotate(-90deg)}
.day.collapsed .day-body{display:none}
.day-body{padding:10px 12px 14px}
.symgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:5px}
.symcell{display:flex;align-items:center;gap:7px;padding:5px 9px;border-radius:6px;cursor:pointer;
  border:1px solid transparent;transition:.1s}
.symcell:hover{background:var(--panel2)}
.symcell .sr{font-family:var(--mono);font-size:10px;color:var(--dim2);width:18px;text-align:right}
.symcell .sn{font-family:var(--mono);font-size:12.5px;font-weight:500}
.symcell .sv{font-family:var(--mono);font-size:10px;color:var(--dim);margin-left:auto}
.symcell.isnew{background:rgba(232,176,75,.08);border-color:var(--signal-dim)}
.symcell.isnew .sn{color:var(--signal);font-weight:600}
.symcell.isnew::after{content:"NEW";font-family:var(--mono);font-size:7.5px;letter-spacing:.08em;
  color:var(--signal);border:1px solid var(--signal-dim);border-radius:3px;padding:0 3px}
.symcell.dim{opacity:.32}
.dropline{margin-top:10px;padding-top:9px;border-top:1px solid var(--panel2);font-size:11px;color:var(--dim);line-height:1.7}
.dropline b{color:var(--down);font-weight:500;text-transform:uppercase;letter-spacing:.08em;font-size:9.5px;margin-right:6px}
.dropline .ds{font-family:var(--mono);color:var(--dim);margin-right:7px}
@media(max-width:880px){.grid{grid-template-columns:1fr}.lb{max-height:340px}.scorecard{width:100%}.movers-grid{grid-template-columns:1fr}.hist-controls input[type=search]{width:140px}}
.analyze-btn{font-family:var(--disp);font-size:12px;font-weight:600;color:var(--signal);
  background:rgba(232,176,75,.08);border:1px solid var(--signal-dim);border-radius:7px;
  padding:6px 12px;cursor:pointer;margin-left:auto;margin-right:10px;transition:.12s;white-space:nowrap}
.analyze-btn:hover{background:rgba(232,176,75,.18)}

/* detail page */
.dt-head{display:flex;align-items:center;gap:14px;margin-bottom:18px;flex-wrap:wrap}
.dt-back{font-family:var(--mono);font-size:12px;color:var(--dim);background:var(--panel2);
  border:1px solid var(--line);border-radius:7px;padding:7px 13px;cursor:pointer}
.dt-back:hover{color:var(--text)}
.dt-title{display:flex;align-items:baseline;gap:12px}
.dt-title h2{font-size:24px;font-weight:700;letter-spacing:-.01em;font-family:var(--mono)}
.dt-meta{font-size:12px;color:var(--dim)}
.dt-links{display:flex;gap:8px;margin-left:auto;flex-wrap:wrap}
.dt-links a{font-family:var(--mono);font-size:11px;color:var(--signal);text-decoration:none;
  border:1px solid var(--signal-dim);border-radius:6px;padding:5px 10px}
.dt-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:14px}
.dt-card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px 16px}
.dt-card h3{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--dim);margin-bottom:10px;font-weight:600}
.dt-row{display:flex;justify-content:space-between;align-items:baseline;padding:4px 0;font-size:13px}
.dt-row .k{color:var(--dim)}
.dt-row .v{font-family:var(--mono);font-weight:600}
.dt-big{font-family:var(--mono);font-size:34px;font-weight:700;line-height:1}
.dt-sub{font-size:11px;color:var(--dim);margin-top:4px}
.tag-pill{display:inline-block;font-family:var(--mono);font-size:10px;padding:2px 8px;border-radius:5px;border:1px solid var(--line)}
.tag-bull{color:var(--up);border-color:#1f4a36;background:rgba(63,185,122,.08)}
.tag-bear{color:var(--down);border-color:#43282a;background:rgba(226,97,90,.08)}
.tag-neut{color:var(--dim);background:var(--panel2)}
.dt-scorewrap{display:flex;align-items:center;gap:18px;flex-wrap:wrap}
.dt-gauge{width:96px;height:96px;flex:none}
.dt-bars{flex:1;min-width:200px}
.dt-bar{display:flex;align-items:center;gap:8px;margin:5px 0;font-size:11px}
.dt-bar .bl{width:74px;color:var(--dim);flex:none}
.dt-bar .bt{flex:1;height:6px;background:var(--panel2);border-radius:3px;overflow:hidden;position:relative}
.dt-bar .bf{position:absolute;top:0;bottom:0;left:50%;border-radius:3px}
.dt-note{font-size:11.5px;color:var(--dim);line-height:1.6;margin-top:6px}
.dt-full{grid-column:1/-1}
.dt-disc{font-size:11px;color:var(--dim2);line-height:1.6;margin-top:16px;padding:12px 14px;border:1px solid var(--line);border-radius:8px;background:var(--panel2)}
.dt-levels{display:flex;flex-direction:column;gap:7px}
.dt-lv{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:12px}
.dt-lv .dot{width:7px;height:7px;border-radius:50%;flex:none}
@media(max-width:880px){.analyze-btn{margin-left:0;width:100%;order:3;margin-right:0}.dt-title h2{font-size:20px}}

.dt-verdict{display:flex;align-items:center;gap:18px;flex-wrap:wrap;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin-bottom:4px}
.dt-verdict .vcell{flex:none}.dt-verdict .vlabel{font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--dim);margin-bottom:3px}
.dt-verdict .vscore{font-family:var(--mono);font-size:30px;font-weight:700;line-height:1}.dt-verdict .vscore span{font-size:14px;color:var(--dim)}
.dt-verdict .voutlook{font-family:var(--disp);font-size:22px;font-weight:700}
.dt-verdict .vtext{flex:1;min-width:220px;font-size:12.5px;color:var(--dim);line-height:1.55;border-left:1px solid var(--line);padding-left:16px}
.dt-trend{display:flex;gap:24px}.dt-trend .tlab{font-size:10px;color:var(--dim);margin-bottom:4px;text-transform:uppercase;letter-spacing:.08em}
.dt-pat{border:1px solid var(--line);border-radius:8px;padding:10px 12px;margin-bottom:8px}
.dt-pat-h{display:flex;align-items:center;gap:8px;font-family:var(--disp);font-weight:600;font-size:13px;margin-bottom:6px}

let curSym=null, curRange=66;
const YYYYMMDD=n=>{const s=''+n;return s.slice(4,6)+'/'+s.slice(6,8);};

function rsiCalc(c,p=14){const o=Array(c.length).fill(null);if(c.length<=p)return o;
  let g=0,l=0;for(let i=1;i<=p;i++){const d=c[i]-c[i-1];if(d>=0)g+=d;else l-=d;}g/=p;l/=p;
  o[p]=l===0?100:100-100/(1+g/l);
  for(let i=p+1;i<c.length;i++){const d=c[i]-c[i-1],gg=d>0?d:0,ll=d<0?-d:0;
    g=(g*(p-1)+gg)/p;l=(l*(p-1)+ll)/p;o[i]=l===0?100:100-100/(1+g/l);}return o;}

function dmiCalc(h,lo,c,p=14){const n=c.length;const pdm=Array(n).fill(0),mdm=Array(n).fill(0),tr=Array(n).fill(0);
  for(let i=1;i<n;i++){const up=h[i]-h[i-1],dn=lo[i-1]-lo[i];
    pdm[i]=(up>dn&&up>0)?up:0;mdm[i]=(dn>up&&dn>0)?dn:0;
    tr[i]=Math.max(h[i]-lo[i],Math.abs(h[i]-c[i-1]),Math.abs(lo[i]-c[i-1]));}
  const pdi=Array(n).fill(null),mdi=Array(n).fill(null),adx=Array(n).fill(null);
  if(n<=p+1)return{pdi,mdi,adx};
  let sTR=0,sP=0,sM=0;for(let i=1;i<=p;i++){sTR+=tr[i];sP+=pdm[i];sM+=mdm[i];}
  const dx=[];
  for(let i=p;i<n;i++){if(i>p){sTR=sTR-sTR/p+tr[i];sP=sP-sP/p+pdm[i];sM=sM-sM/p+mdm[i];}
    const pd=sTR===0?0:100*sP/sTR,md=sTR===0?0:100*sM/sTR;pdi[i]=pd;mdi[i]=md;
    dx.push({i,dd:(pd+md)===0?0:100*Math.abs(pd-md)/(pd+md)});}
  if(dx.length>p){let a=0;for(let k=0;k<p;k++)a+=dx[k].dd;a/=p;adx[dx[p].i]=a;
    for(let k=p+1;k<dx.length;k++){a=(a*(p-1)+dx[k].dd)/p;adx[dx[k].i]=a;}}
  return{pdi,mdi,adx};}

function smaCalc(c,p){const o=Array(c.length).fill(null);let s=0;
  for(let i=0;i<c.length;i++){s+=c[i];if(i>=p)s-=c[i-p];if(i>=p-1)o[i]=s/p;}return o;}

function drawChart(){
  const ch=DATA.charts[curSym]; if(!ch)return;
  const cv=document.getElementById('cv'), box=cv.parentElement;
  const dpr=window.devicePixelRatio||1;
  const W=box.clientWidth, H=box.clientHeight;
  cv.width=W*dpr; cv.height=H*dpr;
  const g=cv.getContext('2d'); g.setTransform(dpr,0,0,dpr,0,0); g.clearRect(0,0,W,H);

  const o=ch.o,c=ch.c,v=ch.v,d=ch.d, N=c.length;
  const hi=o.map((x,i)=>Math.max(x,c[i])), lo=o.map((x,i)=>Math.min(x,c[i]));
  const RSI=rsiCalc(c), DMI=dmiCalc(hi,lo,c), MA=smaCalc(c,20);
  const s=Math.max(0,N-curRange), n=N-s;
  const css=getComputedStyle(document.documentElement);
  const COL={up:css.getPropertyValue('--up').trim(),down:css.getPropertyValue('--down').trim(),
    sig:css.getPropertyValue('--signal').trim(),dim:css.getPropertyValue('--dim').trim(),
    line:css.getPropertyValue('--line').trim(),text:css.getPropertyValue('--text').trim()};
  g.font='10px IBM Plex Mono, monospace';

  // panel rects
  const padL=6,padR=46,top=8,bot=18;
  const x0=padL, x1=W-padR, plotW=x1-x0;
  const gap=8;
  const hPrice=(H-top-bot)*0.50, hVol=(H-top-bot)*0.13, hRsi=(H-top-bot)*0.185, hDmi=(H-top-bot)*0.185;
  const yPrice=top, yVol=yPrice+hPrice+gap*0, yRsi=yVol+hVol+gap, yDmi=yRsi+hRsi+gap;
  const bw=Math.max(1.2, plotW/n*0.62);
  const cx=i=> x0 + (i-s+0.5)*(plotW/n);

  function axisLabel(x,y,txt,col){g.fillStyle=col;g.textAlign='left';g.fillText(txt,x,y);}
  // ---- price panel ----
  let pmin=Infinity,pmax=-Infinity;
  for(let i=s;i<N;i++){pmin=Math.min(pmin,lo[i]);pmax=Math.max(pmax,hi[i]);
    if(MA[i]!=null){pmin=Math.min(pmin,MA[i]);pmax=Math.max(pmax,MA[i]);}}
  const pPad=(pmax-pmin)*0.08||1; pmin-=pPad; pmax+=pPad;
  const yP=val=>yPrice+hPrice-(val-pmin)/(pmax-pmin)*hPrice;
  // grid + price labels
  g.strokeStyle=COL.line; g.lineWidth=1; g.textAlign='left';
  for(let k=0;k<=3;k++){const val=pmin+(pmax-pmin)*k/3; const yy=yP(val);
    g.globalAlpha=.35;g.beginPath();g.moveTo(x0,yy);g.lineTo(x1,yy);g.stroke();g.globalAlpha=1;
    g.fillStyle=COL.dim; g.fillText(val.toFixed(2), x1+4, yy+3);}
  // candles (open->close body)
  for(let i=s;i<N;i++){const up=c[i]>=o[i]; g.fillStyle=up?COL.up:COL.down;
    const yo=yP(o[i]),yc=yP(c[i]); const h=Math.max(1,Math.abs(yc-yo));
    g.fillRect(cx(i)-bw/2, Math.min(yo,yc), bw, h);}
  // MA20
  g.strokeStyle=COL.sig; g.lineWidth=1.3; g.beginPath(); let started=false;
  for(let i=s;i<N;i++){if(MA[i]==null)continue;const xx=cx(i),yy=yP(MA[i]);
    if(!started){g.moveTo(xx,yy);started=true;}else g.lineTo(xx,yy);} g.stroke();
  g.fillStyle=COL.sig; g.textAlign='left'; g.fillText('MA20', x0+2, yPrice+10);

  // ---- volume panel ----
  let vmax=0; for(let i=s;i<N;i++)vmax=Math.max(vmax,v[i]);
  for(let i=s;i<N;i++){const up=c[i]>=o[i]; g.fillStyle=up?COL.up:COL.down; g.globalAlpha=.55;
    const bh=vmax?(v[i]/vmax)*hVol:0; g.fillRect(cx(i)-bw/2, yVol+hVol-bh, bw, bh);}
  g.globalAlpha=1; g.fillStyle=COL.dim; g.fillText('Vol', x0+2, yVol+9);

  // ---- RSI panel ----
  const yR=val=>yRsi+hRsi-(val/100)*hRsi;
  g.strokeStyle=COL.line; g.globalAlpha=.6;
  [30,70].forEach(lv=>{g.beginPath();g.setLineDash([3,3]);g.moveTo(x0,yR(lv));g.lineTo(x1,yR(lv));g.stroke();g.setLineDash([]);});
  g.globalAlpha=1; g.fillStyle=COL.dim; g.fillText('70',x1+4,yR(70)+3); g.fillText('30',x1+4,yR(30)+3);
  g.strokeStyle=COL.text; g.lineWidth=1.2; g.beginPath(); started=false;
  for(let i=s;i<N;i++){if(RSI[i]==null)continue;const xx=cx(i),yy=yR(RSI[i]);
    if(!started){g.moveTo(xx,yy);started=true;}else g.lineTo(xx,yy);} g.stroke();
  g.fillStyle=COL.dim; g.fillText('RSI', x0+2, yRsi+9);

  // ---- DMI panel ----
  let dmax=25; for(let i=s;i<N;i++){[DMI.pdi[i],DMI.mdi[i],DMI.adx[i]].forEach(x=>{if(x!=null)dmax=Math.max(dmax,x);});}
  const yD=val=>yDmi+hDmi-(val/dmax)*hDmi;
  const drawSeries=(arr,col)=>{g.strokeStyle=col;g.lineWidth=1.2;g.beginPath();let st=false;
    for(let i=s;i<N;i++){if(arr[i]==null)continue;const xx=cx(i),yy=yD(arr[i]);
      if(!st){g.moveTo(xx,yy);st=true;}else g.lineTo(xx,yy);}g.stroke();};
  drawSeries(DMI.pdi,COL.up); drawSeries(DMI.mdi,COL.down); drawSeries(DMI.adx,COL.sig);
  g.fillStyle=COL.dim; g.fillText('DMI',x0+2,yDmi+9);
  g.fillStyle=COL.up; g.fillText('+DI',x0+30,yDmi+9);
  g.fillStyle=COL.down; g.fillText('-DI',x0+58,yDmi+9);
  g.fillStyle=COL.sig; g.fillText('ADX',x0+84,yDmi+9);

  // x date ticks
  g.fillStyle=COL.dim; g.textAlign='center';
  for(let k=0;k<=4;k++){const i=s+Math.floor((n-1)*k/4); if(i<N)g.fillText(YYYYMMDD(d[i]),cx(i),H-5);}

  chState={s,N,cx:Array.from({length:N},(_,i)=>cx(i)),o,c,v,d,RSI,DMI,
    geom:{x0,x1,top,bottom:H-bot}};
}

const TA=(function(){
// ===== PSX technical-analysis engine (pure functions, testable in Node) =====
// Works on daily series: d[](YYYYMMDD), o[], c[], v[]. EOD has no true H/L,
// so hi/lo are synthesised from open/close and this is disclosed in the UI.
function sma(a,p){const o=Array(a.length).fill(null);let s=0;for(let i=0;i<a.length;i++){s+=a[i];if(i>=p)s-=a[i-p];if(i>=p-1)o[i]=s/p;}return o;}
function rsiCalc(c,p=14){const o=Array(c.length).fill(null);let g=0,l=0;
  for(let i=1;i<c.length;i++){const d=c[i]-c[i-1];const up=Math.max(d,0),dn=Math.max(-d,0);
    if(i<=p){g+=up;l+=dn;if(i===p){g/=p;l/=p;o[i]=l===0?100:100-100/(1+g/l);}}
    else{g=(g*(p-1)+up)/p;l=(l*(p-1)+dn)/p;o[i]=l===0?100:100-100/(1+g/l);}}return o;}
function dmiCalc(hi,lo,c,p=14){const n=c.length,pdi=Array(n).fill(null),mdi=Array(n).fill(null),adx=Array(n).fill(null);
  let tr=0,pD=0,mD=0;const trs=[],pds=[],mds=[];
  for(let i=1;i<n;i++){const up=hi[i]-hi[i-1],dn=lo[i-1]-lo[i];
    const pm=(up>dn&&up>0)?up:0,mm=(dn>up&&dn>0)?dn:0;
    const t=Math.max(hi[i]-lo[i],Math.abs(hi[i]-c[i-1]),Math.abs(lo[i]-c[i-1]));
    trs.push(t);pds.push(pm);mds.push(mm);}
  const dx=[];
  for(let i=0;i<trs.length;i++){if(i<p){tr+=trs[i];pD+=pds[i];mD+=mds[i];
      if(i===p-1){const pdiv=100*pD/tr,mdiv=100*mD/tr;pdi[i+1]=pdiv;mdi[i+1]=mdiv;dx.push(100*Math.abs(pdiv-mdiv)/(pdiv+mdiv||1));}}
    else{tr=tr-tr/p+trs[i];pD=pD-pD/p+pds[i];mD=mD-mD/p+mds[i];
      const pdiv=100*pD/tr,mdiv=100*mD/tr;pdi[i+1]=pdiv;mdi[i+1]=mdiv;
      dx.push(100*Math.abs(pdiv-mdiv)/(pdiv+mdiv||1));}}
  let a=0;for(let i=0;i<dx.length;i++){if(i<p)a+=dx[i];if(i===p-1)adx[p+i]=a/p;else if(i>=p){a=(a*(p-1)+dx[i])/p;adx[p+i]=a;}}
  return {pdi,mdi,adx};}

// pivots: swing highs on hi[], swing lows on lo[]; returns {hi:[{i,v}], lo:[{i,v}]}
function pivots(hi,lo,k=3){const H=[],L=[];
  for(let i=k;i<hi.length-k;i++){let ih=true,il=true;
    for(let j=i-k;j<=i+k;j++){if(j===i)continue;if(hi[j]>=hi[i])ih=false;if(lo[j]<=lo[i])il=false;}
    if(ih)H.push({i,v:hi[i]});if(il)L.push({i,v:lo[i]});}
  return {hi:H,lo:L};}

function linreg(xs,ys){const n=xs.length;let sx=0,sy=0,sxy=0,sxx=0;
  for(let i=0;i<n;i++){sx+=xs[i];sy+=ys[i];sxy+=xs[i]*ys[i];sxx+=xs[i]*xs[i];}
  const slope=(n*sxy-sx*sy)/(n*sxx-sx*sx||1),inter=(sy-slope*sx)/n;return {slope,inter};}

function analyze(series){
  const d=series.d,o=series.o,c=series.c,v=series.v,N=c.length;
  const hi=o.map((x,i)=>Math.max(x,c[i])),lo=o.map((x,i)=>Math.min(x,c[i]));
  const px=c[N-1];
  const MA10=sma(c,10),MA20=sma(c,20),MA50=sma(c,50),MA200=sma(c,200);
  const RSI=rsiCalc(c),DMI=dmiCalc(hi,lo,c);
  const rsi=RSI[N-1]??50, adx=DMI.adx[N-1]??0, pdi=DMI.pdi[N-1]??0, mdi=DMI.mdi[N-1]??0;
  const piv=pivots(hi,lo,3);

  // ---- trend (daily ~ MA10/20/50; weekly ~ MA50/200 & 5d/25d structure) ----
  const slope=(arr,n)=>arr[N-1]!=null&&arr[N-1-n]!=null?(arr[N-1]-arr[N-1-n])/arr[N-1-n]*100:0;
  function trend(maFast,maSlow,nf){let sc=0;const px=c[N-1];
    if(maFast[N-1]&&px>maFast[N-1])sc++;else sc--;
    if(maSlow[N-1]&&px>maSlow[N-1])sc++;else sc--;
    if(slope(maFast,nf)>0.2)sc++;else if(slope(maFast,nf)<-0.2)sc--;
    return sc>=2?'Bullish':sc<=-2?'Bearish':'Neutral';}
  const daily=trend(MA10,MA50,5), weekly=trend(MA50,MA200||MA50,15);
  const dailyReason=`Price ${px>(MA10[N-1]||px)?'above':'below'} 10-day & ${px>(MA50[N-1]||px)?'above':'below'} 50-day MA; 10-day MA ${slope(MA10,5)>=0?'rising':'falling'} (${slope(MA10,5).toFixed(1)}%/wk).`;
  const weekReason=`Price ${px>(MA50[N-1]||px)?'above':'below'} 50-day & ${MA200[N-1]?(px>MA200[N-1]?'above':'below')+' 200-day':'(no 200-day yet)'}; 50-day MA ${slope(MA50,15)>=0?'rising':'falling'} (${slope(MA50,15).toFixed(1)}%/3wk).`;

  // ---- support / resistance + zones ----
  const lookback=Math.min(N,140);
  const recentLows=piv.lo.filter(p=>p.i>=N-lookback).map(p=>p.v);
  const recentHighs=piv.hi.filter(p=>p.i>=N-lookback).map(p=>p.v);
  function cluster(vals,tol=0.025){const s=[...vals].sort((a,b)=>a-b),groups=[];
    for(const x of s){const g=groups[groups.length-1];
      if(g&&Math.abs(x-g.mean)/g.mean<=tol){g.vals.push(x);g.mean=g.vals.reduce((a,b)=>a+b,0)/g.vals.length;}
      else groups.push({vals:[x],mean:x});}
    return groups.map(g=>({level:g.mean,touches:g.vals.length})).sort((a,b)=>b.touches-a.touches);}
  const supClusters=cluster(recentLows).filter(g=>g.level<px*1.005);
  const resClusters=cluster(recentHighs).filter(g=>g.level>px*0.995);
  const supports=supClusters.sort((a,b)=>b.level-a.level).slice(0,3);
  const resistances=resClusters.sort((a,b)=>a.level-b.level).slice(0,3);
  const demandZone=supports[0]?{lo:Math.min(...supports[0].level?[supports[0].level]:[]) * 0.985, hi:supports[0].level*1.005, level:supports[0].level}:null;
  const supplyZone=resistances[0]?{lo:resistances[0].level*0.995, hi:resistances[0].level*1.015, level:resistances[0].level}:null;

  // ---- RSI divergence (last ~40 bars, compare last two price pivots vs RSI) ----
  function divergence(){const lows=piv.lo.filter(p=>p.i>=N-45);const highs=piv.hi.filter(p=>p.i>=N-45);
    let bull=null,bear=null;
    if(lows.length>=2){const a=lows[lows.length-2],b=lows[lows.length-1];
      if(b.v<a.v && (RSI[b.i]??50)>(RSI[a.i]??50)+1)bull=true;}
    if(highs.length>=2){const a=highs[highs.length-2],b=highs[highs.length-1];
      if(b.v>a.v && (RSI[b.i]??50)<(RSI[a.i]??50)-1)bear=true;}
    return {bull,bear};}
  const rsiDiv=divergence();
  const rsiTrend=(RSI[N-1]??50)-(RSI[N-6]??50);

  // ---- DI crossover (scan last 8 bars) ----
  let diCross='No active signal';
  for(let i=N-1;i>=Math.max(1,N-8);i--){const p0=DMI.pdi[i-1],m0=DMI.mdi[i-1],p1=DMI.pdi[i],m1=DMI.mdi[i];
    if(p0!=null&&m0!=null&&p1!=null&&m1!=null){if(p0<=m0&&p1>m1){diCross='Bullish crossover';break;}if(m0<=p0&&m1>p1){diCross='Bearish crossover';break;}}}

  // ---- volume ----
  const vavg=v.slice(-20).reduce((a,b)=>a+b,0)/Math.min(20,v.length);
  const vlast=v[N-1],rvol=vlast/vavg;
  const up5=c[N-1]>c[N-6];
  // accumulation/distribution: sum signed volume last 10
  let acc=0;for(let i=N-10;i<N;i++){if(i>0)acc+=(c[i]>=c[i-1]?1:-1)*v[i];}
  const accDist=acc>0?'Accumulation':'Distribution';
  const breakoutConf=(rvol>=1.5&&px>=(resistances[0]?resistances[0].level:px))?'Yes — volume confirms breakout':rvol>=1.5?'Elevated volume':'No strong confirmation';

  // ---- pattern detection ----
  const patterns=detectPatterns({c,hi,lo,v,N,px,piv,MA50,vavg});

  // ---- technical score 0-10 ----
  let s=5;
  s+=daily==='Bullish'?1.2:daily==='Bearish'?-1.2:0;
  s+=weekly==='Bullish'?1.2:weekly==='Bearish'?-1.2:0;
  s+=rsi>=70?-0.6:rsi<=30?0.6:rsi>=55?0.8:rsi<=45?-0.8:0;
  s+=adx>=25?(pdi>mdi?1.2:-1.2):adx>=20?(pdi>mdi?0.6:-0.6):0;
  s+=diCross==='Bullish crossover'?0.8:diCross==='Bearish crossover'?-0.8:0;
  s+=(rvol>=1.5&&up5)?0.6:(rvol>=1.5&&!up5)?-0.6:0;
  s+=rsiDiv.bull?0.6:0; s+=rsiDiv.bear?-0.6:0;
  const bullPat=patterns.filter(p=>p.bias==='Bullish').reduce((a,p)=>a+p.confidence,0)/100;
  const bearPat=patterns.filter(p=>p.bias==='Bearish').reduce((a,p)=>a+p.confidence,0)/100;
  s+=Math.min(1.2,bullPat)-Math.min(1.2,bearPat);
  s=Math.max(0,Math.min(10,s));
  const score=Math.round(s*10)/10;
  const outlook=score>=6.5?'Bullish':score>=4.5?'Neutral':'Bearish';

  // ---- trading plan (mechanical, from S/R + ATR-ish) ----
  const atr=(()=>{let t=0,n=0;for(let i=N-14;i<N;i++){if(i>0){t+=Math.max(hi[i]-lo[i],Math.abs(hi[i]-c[i-1]));n++;}}return n?t/n:px*0.02;})();
  const sup1=supports[0]?supports[0].level:px*0.95;
  const stopLevel = +Math.max(sup1*0.99, px-2*atr).toFixed(2);
  const riskDist = Math.max(px - stopLevel, atr*0.5);   // distance we're risking

  // T1 must clear at least a 1.2:1 reward:risk vs the actual stop, AND represent a
  // real move (not noise) — whichever is further from price wins, so thin resistance
  // data or a distant stop can't silently produce a poor risk:reward setup.
  let r1=resistances[0]?resistances[0].level:px*1.05;
  const r1Floor = Math.max(px*1.025, px + riskDist*1.2);
  if(r1 < r1Floor) r1 = r1Floor;
  const r2=resistances[1]&&resistances[1].level>r1?resistances[1].level:Math.max(r1*1.035,px+riskDist*2);
  const r3=resistances[2]&&resistances[2].level>r2?resistances[2].level:Math.max(r2*1.035,px+riskDist*3);
  const plan={
    entry:[+(px-0.3*atr).toFixed(2),+(px+0.3*atr).toFixed(2)],
    stop:stopLevel,
    t1:+r1.toFixed(2),t2:+r2.toFixed(2),t3:+r3.toFixed(2)};
  const risk=px-plan.stop, reward=plan.t1-px;
  plan.rr=risk>0?+(reward/risk).toFixed(2):null;

  return {px,rsi:+rsi.toFixed(1),rsiTrend:+rsiTrend.toFixed(1),rsiDiv,adx:+adx.toFixed(1),pdi:+pdi.toFixed(1),mdi:+mdi.toFixed(1),diCross,
    daily,weekly,dailyReason,weekReason,supports,resistances,demandZone,supplyZone,
    vlast,vavg:Math.round(vavg),rvol:+rvol.toFixed(2),accDist,breakoutConf,patterns,score,outlook,plan,atr:+atr.toFixed(2),
    rsiZone:rsi>=70?'Overbought':rsi<=30?'Oversold':'Neutral',
    adxStrength:adx>=40?'Very strong':adx>=25?'Strong':adx>=20?'Developing':'Weak'};
}

function detectPatterns({c,hi,lo,v,N,px,piv,MA50,vavg}){
  const out=[];const win=Math.min(N,60);
  const H=piv.hi.filter(p=>p.i>=N-win),L=piv.lo.filter(p=>p.i>=N-win);
  const near=(a,b,t)=>Math.abs(a-b)/((a+b)/2)<=t;
  const recent=p=>p.i>=N-22;                 // pattern must be current, not stale
  const add=(o)=>{ if(!o||o.confidence<50)return;
    if(o.bias==='Bullish'&&o.target<=px)return;
    if(o.bias==='Bearish'&&o.target>=px)return;
    if(o.breakout&&Math.abs(px-o.breakout)/px>0.12)return;
    if(o.target&&Math.abs(o.target-px)/px>0.35)return;   // target too far to be reliable
    o.confidence=Math.min(75,Math.max(50,Math.round(o.confidence)));
    out.push(o); };
  const lastHi=Math.max(...hi.slice(-win)), lastLo=Math.min(...lo.slice(-win));
  const height=lastHi-lastLo;

  if(L.length>=2){const a=L[L.length-2],b=L[L.length-1];
    if(b.i-a.i>=5&&recent(b)&&near(a.v,b.v,0.04)){const neck=Math.max(...hi.slice(a.i,b.i+1));
      add({name:'Double Bottom',bias:'Bullish',confidence:68-Math.abs(a.v-b.v)/a.v*300+(px>neck*0.98?8:0),
        breakout:+neck.toFixed(2),target:+(neck+(neck-(a.v+b.v)/2)).toFixed(2),stop:+(Math.min(a.v,b.v)*0.98).toFixed(2)});}}
  if(H.length>=2){const a=H[H.length-2],b=H[H.length-1];
    if(b.i-a.i>=5&&recent(b)&&near(a.v,b.v,0.04)){const neck=Math.min(...lo.slice(a.i,b.i+1));
      add({name:'Double Top',bias:'Bearish',confidence:68-Math.abs(a.v-b.v)/a.v*300+(px<neck*1.02?8:0),
        breakout:+neck.toFixed(2),target:+(neck-((a.v+b.v)/2-neck)).toFixed(2),stop:+(Math.max(a.v,b.v)*1.02).toFixed(2)});}}

  if(H.length>=3){const [l,m,r]=H.slice(-3);
    if(recent(r)&&m.v>l.v&&m.v>r.v&&near(l.v,r.v,0.05)){const neck=Math.min(...lo.slice(l.i,r.i+1));
      add({name:'Head & Shoulders',bias:'Bearish',confidence:58+(near(l.v,r.v,0.03)?10:0),
        breakout:+neck.toFixed(2),target:+(neck-(m.v-neck)).toFixed(2),stop:+(m.v*1.01).toFixed(2)});}}
  if(L.length>=3){const [l,m,r]=L.slice(-3);
    if(recent(r)&&m.v<l.v&&m.v<r.v&&near(l.v,r.v,0.05)){const neck=Math.max(...hi.slice(l.i,r.i+1));
      add({name:'Inverted Head & Shoulders',bias:'Bullish',confidence:58+(near(l.v,r.v,0.03)?10:0),
        breakout:+neck.toFixed(2),target:+(neck+(neck-m.v)).toFixed(2),stop:+(m.v*0.99).toFixed(2)});}}

  if(H.length>=3&&L.length>=3){
    const hx=H.map(p=>p.i),hy=H.map(p=>p.v),lx=L.map(p=>p.i),ly=L.map(p=>p.v);
    const hl=linreg(hx,hy),ll=linreg(lx,ly),hs=hl.slope,ls=ll.slope;
    const norm=px/win, flatH=Math.abs(hs)/norm<0.12, flatL=Math.abs(ls)/norm<0.12;
    if(hs<-1e-4&&ls<-1e-4&&hs<ls){const bl=hl.slope*(N-1)+hl.inter;
      add({name:'Falling Wedge',bias:'Bullish',confidence:56,breakout:+bl.toFixed(2),target:+(bl+height*0.6).toFixed(2),stop:+(lastLo*0.98).toFixed(2)});}
    if(hs>1e-4&&ls>1e-4&&ls>hs){const bl=ll.slope*(N-1)+ll.inter;
      add({name:'Rising Wedge',bias:'Bearish',confidence:54,breakout:+bl.toFixed(2),target:+(bl-height*0.6).toFixed(2),stop:+(lastHi*1.02).toFixed(2)});}
    if(flatH&&ls>1e-4){const bl=Math.max(...hy);
      add({name:'Ascending Triangle',bias:'Bullish',confidence:56,breakout:+bl.toFixed(2),target:+(bl+height*0.7).toFixed(2),stop:+(lastLo*0.98).toFixed(2)});}
    if(flatL&&hs<-1e-4){const bl=Math.min(...ly);
      add({name:'Descending Triangle',bias:'Bearish',confidence:54,breakout:+bl.toFixed(2),target:+(bl-height*0.7).toFixed(2),stop:+(lastHi*1.02).toFixed(2)});}}

  const poleLb=20;if(N>poleLb+7){const poleRet=(c[N-7]-c[N-7-poleLb])/c[N-7-poleLb];
    const consol=(Math.max(...c.slice(-6))-Math.min(...c.slice(-6)))/px;
    if(poleRet>0.13&&consol<0.06)
      add({name:'Bullish Flag',bias:'Bullish',confidence:55,breakout:+Math.max(...c.slice(-6)).toFixed(2),target:+(px*(1+poleRet*0.7)).toFixed(2),stop:+(Math.min(...c.slice(-6))*0.97).toFixed(2)});
    if(poleRet<-0.13&&consol<0.06)
      add({name:'Bearish Flag',bias:'Bearish',confidence:53,breakout:+Math.min(...c.slice(-6)).toFixed(2),target:+(px*(1+poleRet*0.7)).toFixed(2),stop:+(Math.max(...c.slice(-6))*1.03).toFixed(2)});}

  if(N>50){const seg=c.slice(-45),mid=Math.min(...seg),midIdx=seg.indexOf(mid);
    const leftRim=Math.max(...seg.slice(0,8)),rightRim=Math.max(...seg.slice(-12,-3));
    if(midIdx>10&&midIdx<35&&near(leftRim,rightRim,0.06)&&(leftRim-mid)/leftRim>0.12&&c[N-1]<rightRim&&c[N-1]>mid)
      add({name:'Cup & Handle',bias:'Bullish',confidence:54,breakout:+rightRim.toFixed(2),target:+(rightRim+(rightRim-mid)*0.6).toFixed(2),stop:+(Math.min(...seg.slice(-10))*0.98).toFixed(2)});}

  if(H.length>=2){const prevRes=H[H.length-2].v;
    const brokeIdx=c.findIndex((x,i)=>i>H[H.length-2].i&&x>prevRes*1.01);
    if(brokeIdx>0&&px>=prevRes*0.985&&px<=prevRes*1.06&&Math.min(...c.slice(brokeIdx))<prevRes*1.02)
      add({name:'Breakout & Retest',bias:'Bullish',confidence:54,breakout:+prevRes.toFixed(2),target:+(prevRes+height*0.5).toFixed(2),stop:+(prevRes*0.97).toFixed(2)});}

  out.forEach(p=>{const risk=Math.abs(px-p.stop),rew=Math.abs(p.target-px);p.rr=risk>0?+(rew/risk).toFixed(2):null;});
  // de-dupe to strongest, drop weak opposite-bias reversals
  out.sort((a,b)=>b.confidence-a.confidence);
  const kept=[];for(const p of out){ if(kept.some(k=>k.bias!==p.bias&&k.confidence>=p.confidence&&['Double Bottom','Double Top','Head & Shoulders','Inverted Head & Shoulders'].includes(k.name)&&['Double Bottom','Double Top','Head & Shoulders','Inverted Head & Shoulders'].includes(p.name)))continue; kept.push(p); }
  return kept.slice(0,3);
}
return {analyze};
})();

const THESIS=(function(){
// ===== Investment thesis synthesis (mechanical, built from TA.analyze() + computeFundScore) =====
// No institutional-ownership data exists in PSX's free feed, so that section is omitted
// entirely rather than guessed. Insider section reuses the same filings already parsed
// (dates + buy/sell read only - no shares/price, which PSX doesn't expose as text).

function insiderRead(co){
  const filings=(co&&co.insider)||[];
  let buys=0, sells=0;
  const rows=filings.map(it=>{
    const t=(it[1]||'').toLowerCase();
    const isBuy=/acqui|purchase|bought|\bbuy\b/.test(t);
    const isSell=/dispos|sold|\bsell\b/.test(t);
    if(isBuy)buys++; if(isSell)sells++;
    return {date:it[0], text:it[1], type:isBuy?'Buy':isSell?'Sell':'Filing'};
  });
  let label,score;
  if(filings.length===0){label='Neutral (no recent filings)';score=50;}
  else if(buys>=2&&sells===0){label='Strong insider buying';score=80;}
  else if(buys>sells){label='Moderate insider buying';score=65;}
  else if(sells>buys){label='Insider selling';score=30;}
  else {label='Neutral';score=50;}
  return {rows, buys, sells, label, score};
}

function riskRead(A, co, fScore){
  const risks=[];
  // technical risk: volatility / overbought-ness / weak trend
  const volRisk = A.adx<20 ? 'High' : A.adx<25 ? 'Medium' : 'Low';
  risks.push({cat:'Technical', level: A.rsi>=75?'High':A.rsi>=70?'Medium':'Low',
    note: A.rsi>=70?'RSI overbought — pullback risk elevated.':'RSI not in overbought territory.'});
  risks.push({cat:'Trend strength', level: volRisk,
    note: A.adx<20?'ADX below 20 — trend is weak/ranging, signals less reliable.':'Trend has enough strength to act on.'});
  // financial risk: from fundamentals
  let finLevel='Medium', finNote='Limited fundamental data available.';
  if(co){
    const e0=(co.eps||[])[0], peg=(co.peg||[])[0], nm=(co.net_margin||[])[0];
    if(e0!=null&&e0<0){finLevel='High'; finNote='Latest annual EPS is negative.';}
    else if(nm!=null&&nm<0){finLevel='High'; finNote='Negative net margin in the latest period.';}
    else if(peg!=null&&peg>3){finLevel='Medium'; finNote='PEG above 3 suggests rich valuation relative to growth.';}
    else if(fScore!=null&&fScore>=66){finLevel='Low'; finNote='Profitable with reasonable valuation metrics.';}
    else {finLevel='Medium'; finNote='Mixed fundamentals — no major red flag, no strong cushion either.';}
  }
  risks.push({cat:'Financial', level:finLevel, note:finNote});
  // industry/regulatory: generic, sector-aware only where obvious; otherwise neutral disclosure
  risks.push({cat:'Industry & regulatory', level:'Medium',
    note:'Sector-wide and regulatory risk applies to all PSX-listed companies and isn\u2019t separately quantified here \u2014 use the sector context in the overview above.'});
  const order={High:3,Medium:2,Low:1};
  const overall = risks.reduce((a,r)=>a+order[r.level],0)/risks.length;
  const overallLabel = overall>=2.5?'High':overall>=1.7?'Medium':'Low';
  return {items:risks, overallLabel};
}

function bullBear(A, co, fScore, insider){
  const bull=[], bear=[];
  if(A.daily==='Bullish'||A.weekly==='Bullish') bull.push('Trend: '+(A.weekly==='Bullish'?'weekly':'daily')+' trend is bullish.');
  if(A.diCross==='Bullish crossover') bull.push('DMI: bullish DI crossover, buyers in control.');
  if(A.rsiDiv.bull) bull.push('RSI: bullish divergence \u2014 momentum improving while price was flat/down.');
  if(A.rvol>=1.5 && A.accDist==='Accumulation') bull.push('Volume: elevated volume on accumulation.');
  if(co){
    const g=(co.eps_growth||[])[0]; if(g!=null&&g>15) bull.push('Earnings: EPS growth of '+g.toFixed(0)+'% YoY.');
    if(co.pe!=null&&co.pe>0&&co.pe<12) bull.push('Valuation: P/E of '+co.pe.toFixed(1)+' is on the low side.');
  }
  if(co&&co.catalysts&&co.catalysts.length) bull.push('Catalyst: recent announcement on file \u2014 see Catalysts card.');
  if(insider.label.includes('buying')) bull.push('Insider: '+insider.label.toLowerCase()+'.');

  if(A.daily==='Bearish'||A.weekly==='Bearish') bear.push('Trend: '+(A.weekly==='Bearish'?'weekly':'daily')+' trend is bearish.');
  if(A.rsiZone==='Overbought') bear.push('RSI: overbought at '+A.rsi+', pullback risk.');
  if(A.diCross==='Bearish crossover') bear.push('DMI: bearish DI crossover, sellers in control.');
  if(co){
    const g=(co.eps_growth||[])[0]; if(g!=null&&g<0) bear.push('Earnings: EPS growth negative ('+g.toFixed(0)+'%).');
    if(co.pe!=null&&co.pe>22) bear.push('Valuation: P/E of '+co.pe.toFixed(1)+' is elevated.');
    const e0=(co.eps||[])[0]; if(e0!=null&&e0<0) bear.push('Earnings: latest annual EPS is negative.');
  }
  if(insider.label==='Insider selling') bear.push('Insider: net selling in recent filings.');
  if(A.patterns.some(p=>p.bias==='Bearish')) bear.push('Pattern: a bearish chart pattern is flagged (see Pattern detection).');
  if(bull.length===0) bull.push('No strong bullish signal currently active.');
  if(bear.length===0) bear.push('No strong bearish signal currently active.');
  return {bull, bear};
}

function qualifyingSignals(A, co, fScore, insider){
  const sig=[];
  const add=(name,note)=>sig.push({name,note});
  if(A.rsiZone==='Oversold') add('RSI Oversold','RSI at '+A.rsi+', historically a mean-reversion zone.');
  if(A.rsiZone==='Overbought') add('RSI Overbought','RSI at '+A.rsi+' \u2014 caution on chasing further upside.');
  if(A.rsiDiv.bull) add('Bullish Divergence','Price made a lower low while RSI made a higher low.');
  if(A.rsiDiv.bear) add('Bearish Divergence','Price made a higher high while RSI made a lower high.');
  if(A.adx>=25) add('ADX Rising / Strong Trend','ADX at '+A.adx+' \u2014 trend has conviction.');
  if(A.diCross!=='No active signal') add('DI Crossover', A.diCross+' on the DMI.');
  if(co){
    const g=(co.eps_growth||[])[0]; if(g!=null&&g>20) add('EPS Growth Improving','EPS growth of '+g.toFixed(0)+'% YoY.');
    if(co.pe!=null&&co.pe>0&&co.pe<12) add('Low P/E','P/E of '+co.pe.toFixed(1)+'.');
  }
  if(insider.buys>0) add('Director/Sponsor Buying', insider.buys+' buy-side filing(s) on record.');
  if(co&&co.catalysts&&co.catalysts.length) add('Business Catalyst', 'Recent PSX announcement on file.');
  if(A.patterns[0]) add(A.patterns[0].name, A.patterns[0].bias+' pattern at '+A.patterns[0].confidence+'% confidence.');
  if(sig.length===0) add('No standout signal','Scores are middling across the board \u2014 not a strong setup either way.');
  return sig;
}

function finalVerdict(tech10, fund10, insiderScore, riskLabel, hasInsiderData){
  // 0-100 conviction: weighted blend; risk acts as a damper, not a separate input score.
  // Insider direction is weighted heavily WHEN PRESENT — experienced traders treat
  // director/sponsor buying as a primary signal, not a footnote. But most stocks have
  // no recent filings most of the time, and that absence is not itself bearish — so when
  // there's nothing on file, insider contributes zero influence rather than a flat 50
  // that would otherwise drag every undocumented stock's score down for no real reason.
  const f10 = fund10!=null?fund10:5;
  let conv;
  if(hasInsiderData){
    const ins10 = insiderScore/10;
    conv = (tech10*0.35 + f10*0.30 + ins10*0.35)*10;
  } else {
    conv = (tech10*0.5 + f10*0.5)*10;
  }
  const riskMult = riskLabel==='High'?0.85:riskLabel==='Medium'?0.95:1.0;
  conv = Math.round(conv*riskMult);
  conv = Math.max(0,Math.min(100,conv));
  let verdict;
  if(conv>=78 && riskLabel!=='High') verdict='Strong Buy Candidate';
  else if(conv>=65) verdict='Buy Candidate';
  else if(conv>=50) verdict='Watchlist Candidate';
  else if(conv>=35) verdict='Speculative Opportunity';
  else verdict='Avoid';
  return {conviction:conv, verdict};
}

function targetHeadline(A){
  const pl=A.plan;
  const upT1=((pl.t1/A.px-1)*100), upT2=((pl.t2/A.px-1)*100);
  return {
    entry: pl.entry, stop: pl.stop, t1: pl.t1, t2: pl.t2, t3: pl.t3,
    t1pct: +upT1.toFixed(1), t2pct: +upT2.toFixed(1),
    rr: pl.rr
  };
}
return {insiderRead, riskRead, bullBear, qualifyingSignals, finalVerdict, targetHeadline};
})();

// ===== stock detail page : full technical report (engine: TA.analyze) =====
function computeFundScore(co){
  if(!co) return null;
  let f=50;const g=(co.eps_growth||[])[0],nm=(co.net_margin||[])[0],pe=co.pe,pg=(co.peg||[])[0],e0=(co.eps||[])[0];
  f+=g==null?0:g>20?12:g>0?6:-10; f+=nm==null?0:nm>15?8:nm>5?3:nm<0?-10:0;
  f+=pe==null?0:(pe>0&&pe<10)?8:pe<=18?3:pe>25?-6:0; f+=pg==null?0:(pg>0&&pg<1)?8:pg<2?2:pg>3?-4:0;
  f+=e0==null?0:e0>0?5:-8;
  return Math.max(2,Math.min(98,Math.round(f)));
}

function _verdictText(A){
  const bits=[];
  if(A.diCross!=='No active signal') bits.push(A.diCross.toLowerCase()+' on DMI');
  if(A.adx>=25) bits.push('a '+A.adxStrength.toLowerCase()+' trend (ADX '+A.adx+')');
  if(A.rsiZone!=='Neutral') bits.push('RSI '+A.rsiZone.toLowerCase());
  if(A.rvol>=1.5) bits.push('volume '+A.rvol+'x average ('+A.accDist.toLowerCase()+')');
  if(A.patterns[0]) bits.push('a '+A.patterns[0].name.toLowerCase()+' forming');
  const lead=A.outlook==='Bullish'?'Setup leans bullish':A.outlook==='Bearish'?'Setup leans bearish':'Setup is mixed';
  bits.unshift(A.daily.toLowerCase()+' daily / '+A.weekly.toLowerCase()+' weekly trend');
  return lead+' — '+bits.slice(0,3).join(', ')+'.';
}

function drawPlanChart(ch, A, col){
  const wrap=document.getElementById('planChartWrap'), cv=document.getElementById('planChart');
  wrap.hidden=false;
  const dpr=window.devicePixelRatio||1;
  const cssW=cv.parentElement.clientWidth, cssH=260;
  cv.width=cssW*dpr; cv.height=cssH*dpr; cv.style.width=cssW+'px'; cv.style.height=cssH+'px';
  const g=cv.getContext('2d'); g.setTransform(dpr,0,0,dpr,0,0); g.clearRect(0,0,cssW,cssH);

  const N=Math.min(ch.c.length,90);                 // last ~90 sessions for context
  const closes=ch.c.slice(-N);
  const pl=A.plan;
  const pad={t:14,b:22,l:8,r:64};
  const lo=Math.min(...closes, pl.stop), hi=Math.max(...closes, pl.t3);
  const range=(hi-lo)||1;
  const y=p=>cssH-pad.b-((p-lo)/range)*(cssH-pad.t-pad.b);
  const x=i=>pad.l+(i/(closes.length-1))*(cssW-pad.l-pad.r);

  // gridline + label for a level
  function hline(val,color,label,dashed){
    const yy=y(val);
    g.save();
    g.strokeStyle=color; g.lineWidth=1; g.globalAlpha=0.85;
    if(dashed) g.setLineDash([4,3]);
    g.beginPath(); g.moveTo(pad.l,yy); g.lineTo(cssW-pad.r,yy); g.stroke();
    g.restore();
    g.fillStyle=color; g.font='600 11px "IBM Plex Mono",monospace'; g.textBaseline='middle';
    g.fillText(label+' '+val.toFixed(2), cssW-pad.r+6, yy);
  }

  // entry zone shading
  const ey1=y(pl.entry[0]), ey0=y(pl.entry[1]);
  g.fillStyle=col.sig+'22'; g.fillRect(pad.l, Math.min(ey0,ey1), cssW-pad.l-pad.r, Math.abs(ey1-ey0)||1);

  hline(pl.t3, col.up, 'T3', true);
  hline(pl.t2, col.up, 'T2', true);
  hline(pl.t1, col.up, 'T1', false);
  hline(pl.stop, col.down, 'Stop', false);

  // price line
  g.beginPath(); g.strokeStyle=col.text; g.lineWidth=1.6;
  closes.forEach((p,i)=>{ const px=x(i), py=y(p); i===0?g.moveTo(px,py):g.lineTo(px,py); });
  g.stroke();
  // last price dot
  const lastX=x(closes.length-1), lastY=y(closes[closes.length-1]);
  g.beginPath(); g.fillStyle=col.text; g.arc(lastX,lastY,3,0,7); g.fill();
  g.fillStyle=col.text; g.font='600 11px "IBM Plex Mono",monospace'; g.textBaseline='middle';
  g.fillText(closes[closes.length-1].toFixed(2), Math.min(lastX+6,cssW-pad.r-46), lastY);

  document.getElementById('planChartLegend').innerHTML=
    '<span class="lg"><span class="sw" style="background:'+col.sig+'"></span>Entry zone '+pl.entry[0]+'\u2013'+pl.entry[1]+'</span>'+
    '<span class="lg"><span class="sw" style="background:'+col.down+'"></span>Stop '+pl.stop+'</span>'+
    '<span class="lg"><span class="sw" style="background:'+col.up+'"></span>Targets T1/T2/T3</span>'+
    '<span class="lg">R:R to T1 '+(pl.rr!=null?(pl.rr>8?'8+':pl.rr)+':1':'\u2014')+'</span>';

  // ---- fundamental score + insider (real PSX company data) ----

  let fLabel='',fCol=col.d2;
  if(fScore!=null){fCol=fScore>=66?col.up:fScore>=45?col.sig:col.down; fLabel=fScore>=66?'Strong':fScore>=45?'Mixed':'Weak';}
  let insiderTxt='No recent filings',insiderCol=col.d2,insiderRows='',insiderN=0;

    insiderRows=co.insider.slice(0,4).map(it=>'<div class="dt-row"><span class="k" style="font-size:11px">'+it[0]+'</span><span style="font-size:11px;color:var(--text);text-align:right;max-width:62%">'+it[1]+'</span></div>').join('');}

  const tech100=Math.round(A.score*10);

  const tile=(l,val,c)=>'<div class="dt-card" style="text-align:center;padding:12px 8px"><h3 style="margin-bottom:6px">'+l+'</h3><div class="dt-big" style="font-size:27px;color:'+c+'">'+(val==null?'\u2014':val)+'</div></div>';

  // verdict banner
  const vCol=tcol(A.outlook);
  const verdict='<div class="dt-verdict" style="border-color:'+vCol+'55">'
    +'<div class="vcell"><div class="vlabel">Technical score</div><div class="vscore" style="color:'+vCol+'">'+A.score.toFixed(1)+'<span>/10</span></div></div>'

    +'<div class="vtext">'+_verdictText(A)+'</div></div>';

  // trend
  const trendCard=card('Trend analysis',
    '<div class="dt-trend"><div><div class="tlab">Weekly</div>'+pill(A.weekly)+'</div><div><div class="tlab">Daily</div>'+pill(A.daily)+'</div></div>'

  // support / resistance + zones
  const lv=(label,val,c,extra)=>'<div class="dt-lv"><span class="dot" style="background:'+c+'"></span>'+label+'<b style="margin-left:auto">'+val.toFixed(2)+'</b>'+(extra||'')+'</div>';
  let srInner='<div class="dt-levels">';

  srInner+=lv('Price',px,col.text,'');

  srInner+='</div>';
  if(A.supplyZone||A.demandZone){srInner+='<div class="dt-note" style="margin-top:8px">';
    if(A.supplyZone)srInner+='Supply zone '+A.supplyZone.lo.toFixed(2)+'\u2013'+A.supplyZone.hi.toFixed(2)+' (sellers). ';
    if(A.demandZone)srInner+='Demand zone '+A.demandZone.lo.toFixed(2)+'\u2013'+A.demandZone.hi.toFixed(2)+' (buyers).';
    srInner+='</div>';}
  const srCard=card('Support &amp; resistance',srInner,true);

  // patterns
  let patInner;
  if(A.patterns.length){patInner=A.patterns.map(p=>

  }else{patInner='<div class="dt-note">No high-confidence chart pattern in the recent range. (Detection is heuristic and conservative \u2014 it stays quiet rather than guessing.)</div>';}
  const patCard=card('Pattern detection',patInner,true);

  // trading plan
  const pl=A.plan;
  const planCard=card('Trading plan (mechanical)',
    '<div class="dt-plan">'+row('Entry zone',pl.entry[0]+' \u2013 '+pl.entry[1])+row('Stop loss','<span style="color:'+col.down+'">'+pl.stop+'</span>')

    +row('Target 3','<span style="color:'+col.up+'">'+pl.t3+'</span>')+row('Risk / reward (T1)',(pl.rr!=null?(pl.rr>8?'8+':pl.rr)+' : 1':'\u2014'))+'</div>'

    const revGrew=asales.length>=2&&asales[0]>asales[asales.length-1];

    +'<div class="dt-sec">Insider</div>'
    +'<div class="dt-grid">'+insiderCard+'</div>'
    +'<div class="dt-disc">Technical readings come from historical PSX price &amp; volume (Open\u2192Close candles \u2014 no intraday high/low \u2014 so ADX/DMI, levels, patterns &amp; the trading plan are approximations; pattern detection is heuristic). Fundamentals, insider filings &amp; announcements are parsed from PSX\u2019s company page; book value, P/B, dividend yield, debt &amp; cash-flow are not in that feed and are shown as such. Scores are mechanical &amp; transparent. This is information, <b>not financial advice</b> \u2014 do your own research.</div>';

  // ===== Ownership & Investment Thesis (mechanical synthesis) =====
  // Institutional Holdings / Mutual Funds / Banks / Insurance / Foreign Investors /
  // Shareholding Pattern are NOT in PSX's free feed at all (confirmed directly against
  // the live page) — that section is omitted entirely rather than guessed.
  const ins=THESIS.insiderRead(co);
  const risk=THESIS.riskRead(A, co, fScore);
  const bb=THESIS.bullBear(A, co, fScore, ins);
  const sig=THESIS.qualifyingSignals(A, co, fScore, ins);
  const hasInsiderData=!!(co&&co.insider&&co.insider.length>0);
  const fv=THESIS.finalVerdict(A.score, (fScore!=null?+(fScore/10).toFixed(1):null), ins.score, risk.overallLabel, hasInsiderData);
  const th=THESIS.targetHeadline(A);

  const vColMap={'Strong Buy Candidate':col.up,'Buy Candidate':col.up,'Watchlist Candidate':col.sig,'Speculative Opportunity':col.sig,'Avoid':col.down};
  const vCol2=vColMap[fv.verdict]||col.sig;
  const riskColMap={Low:col.up,Medium:col.sig,High:col.down};

  const thesisVerdict='<div class="dt-verdict" style="border-color:'+vCol2+'55">'
    +'<div class="vcell"><div class="vlabel">Conviction</div><div class="vscore" style="color:'+vCol2+'">'+fv.conviction+'<span>/100</span></div></div>'
    +'<div class="vcell"><div class="vlabel">Verdict</div><div class="voutlook" style="color:'+vCol2+'">'+fv.verdict+'</div></div>'
    +'<div class="vtext">Target <b style="color:'+col.up+'">'+th.t1+'</b> ('+(th.t1pct>=0?'+':'')+th.t1pct+'%) \u00b7 Stop <b style="color:'+col.down+'">'+th.stop+'</b> \u00b7 R:R '+(th.rr!=null?(th.rr>8?'8+':th.rr)+':1':'\u2014')+' \u2014 mechanical synthesis of technical, fundamental &amp; insider signals below. Not a recommendation.</div></div>';

  const sigCard=card('Why this stock qualified', sig.map(s=>
    '<div class="dt-row" style="align-items:flex-start"><span class="k" style="flex:none;width:auto;color:'+col.text+';font-weight:600">'+s.name+'</span><span class="v" style="text-align:right;font-weight:400;color:var(--dim);font-family:var(--disp)">'+s.note+'</span></div>').join(''), true);

  const insiderThesisCard=card('Insider activity & confidence',
    '<div class="dt-row"><span class="k">Read</span><span class="v" style="color:'+(ins.score>=65?col.up:ins.score<=35?col.down:col.sig)+'">'+ins.label+'</span></div>'
    +row('Insider confidence score', (ins.score/10).toFixed(1)+'/10')
    +(ins.rows.length?ins.rows.slice(0,4).map(r=>'<div class="dt-row"><span class="k" style="font-size:11px">'+r.date+' \u00b7 '+r.type+'</span><span style="font-size:11px;color:var(--text);text-align:right;max-width:60%">'+r.text+'</span></div>').join(''):'<div class="dt-note">No recent director/sponsor filings on record.</div>')
    +'<div class="dt-note" style="margin-top:6px">Share count &amp; price aren\u2019t shown \u2014 PSX files these as scanned images, not data.</div>'
    +'<a class="dt-cta" href="https://sarmaaya.pk/stocks/'+sym+'" target="_blank" rel="noopener">Check insider transactions on Sarmaaya \u2192</a>', true);

  const riskCard=card('Risk analysis',
    risk.items.map(r=>'<div class="dt-row"><span class="k">'+r.cat+'</span><span class="v" style="color:'+riskColMap[r.level]+'">'+r.level+'</span></div>'+
      '<div class="dt-note" style="margin:0 0 8px">'+r.note+'</div>').join('')
    +'<div class="dt-row" style="border-top:1px solid var(--line);padding-top:8px;margin-top:4px"><span class="k">Overall risk</span><span class="v" style="color:'+riskColMap[risk.overallLabel]+'">'+risk.overallLabel+'</span></div>', true);

  const bullCard=card('Bull case', bb.bull.map(b=>'<div class="dt-note" style="color:'+col.up+';margin-bottom:5px">\u25b2 '+b+'</div>').join(''), false);
  const bearCard=card('Bear case', bb.bear.map(b=>'<div class="dt-note" style="color:'+col.down+';margin-bottom:5px">\u25bc '+b+'</div>').join(''), false);

  const scoreRow=card('Final scoring',
    row('Technical',A.score.toFixed(1)+'/10')+row('Fundamental',(fScore!=null?(fScore/10).toFixed(1):'\u2014')+'/10')
    +row('Insider confidence',(ins.score/10).toFixed(1)+'/10')+row('Risk',risk.overallLabel)
    +row('Overall conviction','<b style="color:'+vCol2+'">'+fv.conviction+'/100</b>'), false);

  document.getElementById('dtThesis').innerHTML=
    '<div class="dt-sec" style="margin-top:0">Ownership & investment thesis</div>'
    +thesisVerdict
    +'<div class="dt-grid" style="margin-top:14px">'+scoreRow+sigCard+bullCard+bearCard+riskCard+insiderThesisCard+'</div>'
    +'<div class="dt-disc">Institutional holdings, mutual fund / bank / insurance / foreign-investor breakdowns and full shareholding pattern are <b>not available</b> from PSX\u2019s free data feed, so that section is omitted rather than estimated. This synthesis combines the technical, fundamental and insider-filing signals already shown on this page using a fixed, transparent formula \u2014 it is not investment advice.</div>';

  drawPlanChart(ch, A, col);
}

// ===== screener: rank the tracked universe by technical + fundamental score =====
let _scrData=null, _scrSort={key:'overall',dir:-1}, _scrMin=0, _scrShariahOnly=false;
function _computeScreener(){
  const rows=[];
  for(const sym of Object.keys(DATA.charts||{})){
    const ch=DATA.charts[sym];
    if(!ch||!ch.c||ch.c.length<30) continue;
    let A; try{ A=TA.analyze(ch); }catch(e){ continue; }
    const f100=computeFundScore(DATA.companies&&DATA.companies[sym]);
    const tech=A.score;                       // 0-10
    const fund=f100!=null?+(f100/10).toFixed(1):null;
    const overall=fund!=null?+(0.55*tech+0.45*fund).toFixed(1):+tech.toFixed(1);
    rows.push({sym,tech:+tech.toFixed(1),fund,overall,outlook:A.outlook,px:A.px,
      shariah:!!(DATA.shariah&&DATA.shariah[sym]), hasF:fund!=null});
  }
  return rows;
}
function _scol(v){return v==null?'var(--dim2)':v>=6.5?'var(--up)':v>=4.5?'var(--signal)':'var(--down)';}
function renderScreener(){
  const body=document.getElementById('scrBody');
  if(!_scrData){ body.innerHTML='<div class="scr-empty">Scanning your universe\u2026</div>';
    setTimeout(()=>{ _scrData=_computeScreener(); _paintScreener(); },30); return; }
  _paintScreener();
}
function _paintScreener(){
  const body=document.getElementById('scrBody');
  let rows=_scrData.slice();
  if(_scrShariahOnly) rows=rows.filter(r=>r.shariah);
  if(_scrMin>0) rows=rows.filter(r=>r.overall>=_scrMin);
  const k=_scrSort.key,d=_scrSort.dir;
  rows.sort((a,b)=>{let x=a[k],y=b[k]; if(x==null)x=-1; if(y==null)y=-1;
    if(typeof x==='string')return d*x.localeCompare(y); return d*(x-y);});
  document.getElementById('scrSub').textContent=rows.length+' of '+_scrData.length+' stocks'+(_scrShariahOnly?' \u00b7 Shariah only':'');
  if(!rows.length){ body.innerHTML='<div class="scr-empty">No stocks match these filters.</div>'; return; }
  const arrow=key=> _scrSort.key===key?(_scrSort.dir<0?' \u25be':' \u25b4'):'';
  const cls=key=> _scrSort.key===key?' class="sorted"':'';
  let html='<table class="scr-tbl"><thead><tr>'
    +'<th data-k="rank" class="scr-rank">#</th>'
    +'<th data-k="sym">Symbol'+arrow('sym')+'</th>'
    +'<th data-k="overall"'+cls('overall')+'>Overall'+arrow('overall')+'</th>'
    +'<th data-k="tech"'+cls('tech')+'>Technical'+arrow('tech')+'</th>'
    +'<th data-k="fund"'+cls('fund')+'>Fundamental'+arrow('fund')+'</th>'
    +'<th data-k="outlook" class="hide-sm">Outlook</th>'
    +'<th data-k="px" class="hide-sm">Price'+arrow('px')+'</th></tr></thead><tbody>';
  rows.forEach((r,i)=>{
    const strong=r.tech>=6.5&&r.fund!=null&&r.fund>=6.5;
    const badge=r.shariah?'<span class="sh-mini" title="Shariah-compliant"><span class="s-badge">S</span></span>':'';
    const sc=(v)=>'<span class="scr-score" style="color:'+_scol(v)+';background:'+_scol(v)+'1a">'+(v==null?'\u2014':v.toFixed(1))+'</span>';
    html+='<tr data-sym="'+r.sym+'"'+(strong?' class="strong"':'')+'>'
      +'<td class="scr-rank">'+(i+1)+'</td>'
      +'<td>'+r.sym+' '+badge+'</td>'
      +'<td>'+sc(r.overall)+'</td><td>'+sc(r.tech)+'</td><td>'+sc(r.fund)+'</td>'
      +'<td class="hide-sm" style="color:'+(r.outlook==='Bullish'?'var(--up)':r.outlook==='Bearish'?'var(--down)':'var(--dim)')+'">'+r.outlook+'</td>'
      +'<td class="hide-sm">'+r.px.toFixed(2)+'</td></tr>';
  });
  html+='</tbody></table>';
  body.innerHTML=html;
  body.querySelectorAll('th[data-k]').forEach(th=>th.onclick=()=>{
    const key=th.dataset.k; if(key==='rank')return;
    if(_scrSort.key===key)_scrSort.dir*=-1; else {_scrSort.key=key; _scrSort.dir=(key==='sym'||key==='outlook')?1:-1;}
    _paintScreener();
  });
  body.querySelectorAll('tr[data-sym]').forEach(tr=>tr.onclick=()=>openDetail(tr.dataset.sym));
}
document.getElementById('scrMin').addEventListener('click',e=>{
  const b=e.target.closest('button'); if(!b)return;
  document.querySelectorAll('#scrMin button').forEach(x=>x.classList.remove('on')); b.classList.add('on');
  _scrMin=+b.dataset.min; _paintScreener();
});
document.getElementById('scrShariah').addEventListener('click',e=>{
  _scrShariahOnly=!_scrShariahOnly; e.currentTarget.classList.toggle('on',_scrShariahOnly); _paintScreener();
});

  `<b>What your 2 months of data actually show.</b> Across ${s.total_tracked} trackable new-entry events, the average <b>peak</b> `+
  `move after appearing was +${s.avg_peak_pct}% (median time to peak ~4 trading days — matching your "few days to a week"), `+

  `The gap between peak and final is the real lesson: these names tend to pop then fade, so the signal favours <b>exiting into strength</b>, not holding. `+
  `One caveat — forward prices here exist only while a name stays in the Top-30, so stocks that crashed and dropped off aren't fully tracked; the true averages are somewhat lower than shown.`;
