name: psx-dashboard

# Runs every trading day shortly after market close and republishes the dashboard.
# Pakistan is UTC+5 (no daylight saving). Scheduled for 21:07 PKT = 16:07 UTC —
# a few minutes off the top of the hour, since GitHub Actions queues are busiest
# right on the hour (xx:00) and scheduled runs can be delayed or skipped if you
# fire at a "hot" minute on a low-traffic repo.
#
# You can ALSO run it by hand any time from the Actions tab -> "Run workflow".
#
# NOTE: every time this schedule line changes, GitHub re-registers it and the
# very first scheduled run after that can take 15-60 min past the target time
# to be picked up. That's expected once, not a bug.
on:
  schedule:
    - cron: "7 16 * * 1-5"      # Mon–Fri, 16:07 UTC = 21:07 Pakistan time
  workflow_dispatch: {}          # the manual "Run workflow" button

concurrency:
  group: psx-dashboard
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pandas openpyxl beautifulsoup4 lxml numpy

      - name: Fetch PSX + rebuild dashboard
        run: python psx_auto.py

      - name: Publish
        run: |
          cp psx_dashboard.html index.html      # serve at the Pages root
          git config user.name  "psx-bot"
          git config user.email "psx-bot@users.noreply.github.com"
          git add psx_dashboard.html index.html psx_data
          git commit -m "PSX update $(date -u +%F)" || echo "no changes to commit"
          git pull --rebase --autostash
          git push
