name: psx-dashboard

# Runs every trading day at 9:00 PM Pakistan time and republishes the dashboard.
# Pakistan is UTC+5 (no daylight saving), so 21:00 PKT = 16:00 UTC.
# You can ALSO run it by hand any time from the Actions tab -> "Run workflow"
# (use that for a 12 PM / 8 PM / 10 PM / 1 AM run whenever you want a fresh pull).
# GitHub cron is in UTC and can be delayed 10-30 min at peak — fine after the close.
on:
  schedule:
    - cron: "0 16 * * 1-5"      # Mon–Fri, 16:00 UTC = 21:00 Pakistan time
  workflow_dispatch: {}          # the manual "Run workflow" button

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pandas openpyxl beautifulsoup4 lxml numpy

      - name: Fetch PSX + rebuild dashboard
        run: python psx_auto.py

      - name: Publish
        run: |
          cp psx_dashboard.html index.html      # serve at the Pages root
          git config user.name  "psx-bot"
          git config user.email "psx-bot@users.noreply.github.com"
          git add psx_dashboard.html index.html psx_data  
          git commit -m "PSX update $(date -u +%F)" || echo "no changes to commit"
          git push
